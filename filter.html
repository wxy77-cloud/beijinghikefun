<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路线筛选 - 北京徒个乐</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=hiking%20icon%20purple%20color&image_size=square">
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <nav>
            <a href="index.html" class="logo">北京徒个乐</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="routes.html">路线列表</a></li>
                <li><a href="filter.html">路线筛选</a></li>
                <li><a href="guide.html">徒步指南</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- 页面标题 -->
    <section style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); padding: 3rem 0; text-align: center; color: white;">
        <h1>路线筛选</h1>
        <p>根据您的需求筛选出最适合的徒步路线</p>
    </section>

    <!-- 筛选表单 -->
    <section class="container">
        <div class="filter-container">
            <form id="filter-form" class="filter-form">
                <div class="filter-group">
                    <label for="area">所在区域</label>
                    <select id="area">
                        <option value="">全部区域</option>
                        <!-- 区域选项将通过JavaScript动态生成 -->
                    </select>
                </div>
                <div class="filter-group">
                    <label for="difficulty">适合人群</label>
                    <select id="difficulty">
                        <option value="">全部人群</option>
                        <!-- 难度选项将通过JavaScript动态生成 -->
                    </select>
                </div>
                <div class="filter-group">
                    <label for="season">最佳季节</label>
                    <select id="season">
                        <option value="">全部季节</option>
                        <!-- 季节选项将通过JavaScript动态生成 -->
                    </select>
                </div>


                <button type="submit" class="filter-btn">筛选路线</button>
            </form>
        </div>
    </section>

    <!-- 筛选结果 -->
    <section class="container">
        <h2 style="text-align: center; margin: 2rem 0; color: var(--dark-color);">筛选结果</h2>
        <div id="filtered-routes" class="grid">
            <!-- 筛选结果将通过JavaScript动态生成 -->
            <div class="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>北京徒个乐</h3>
                <p>探索城市周边的自然美景，享受徒步的乐趣。</p>
            </div>
            <div class="footer-section">
                <h3>快速链接</h3>
                <a href="index.html">首页</a>
                <a href="routes.html">路线列表</a>
                <a href="filter.html">路线筛选</a>
                <a href="guide.html">徒步指南</a>
                <a href="about.html">关于我们</a>
            </div>
            <div class="footer-section">
                <h3>联系我们</h3>
                <p>邮箱: thisisnotreal.com</p>
                <p>电话: 123-4567-8910</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 北京徒个乐. 保留所有权利.</p>
        </div>
    </footer>

    <!-- 滚动到顶部按钮 -->
    <button id="scroll-to-top" style="position: fixed; bottom: 2rem; right: 2rem; background: var(--primary-color); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; display: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.3s ease;" onclick="scrollToTop()">↑</button>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
</body>
</html>
