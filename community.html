<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>徒步社区 - 北京徒个乐</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=hiking%20icon%20purple%20color&image_size=square">
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <nav>
            <a href="index.html" class="logo">北京徒个乐</a>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="routes.html">路线列表</a></li>
                <li><a href="filter.html">路线筛选</a></li>
                <li><a href="guide.html">徒步指南</a></li>
                <li><a href="community.html">徒步社区</a></li>
                <li><a href="profile.html">个人主页</a></li>
                <li><a href="about.html">关于我们</a></li>
            </ul>
        </nav>
    </header>

    <!-- 页面标题 -->
    <section style="background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); padding: 3rem 0; text-align: center; color: white;">
        <h1>徒步社区</h1>
        <p>分享您的徒步经历，记录美好瞬间</p>
    </section>

    <!-- 社区内容 -->
    <section class="container">
        <div class="community-layout">
            <!-- 发帖表单 -->
            <div class="create-post-section">
                <h2 style="color: var(--dark-color); margin-bottom: 1.5rem;">分享您的徒步经历</h2>
                <form id="post-form" class="post-form">
                    <div class="form-group">
                        <label for="post-title">标题</label>
                        <input type="text" id="post-title" placeholder="给您的帖子起个标题" required>
                    </div>
                    <div class="form-group">
                        <label for="post-content">内容</label>
                        <textarea id="post-content" rows="5" placeholder="分享您的徒步经历、感受和建议..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="post-image">图片</label>
                        <input type="file" id="post-image" accept="image/*">
                        <small style="color: #666;">支持上传图片，展示您的徒步美景</small>
                    </div>
                    <button type="submit" class="btn">发布帖子</button>
                </form>
            </div>

            <!-- 帖子列表 -->
            <div class="posts-section">
                <div class="posts-header">
                    <h2 style="color: var(--dark-color);">社区帖子</h2>
                    <div class="sort-buttons">
                        <button class="sort-btn active" data-sort="time">按时间</button>
                        <button class="sort-btn" data-sort="hot">按热度</button>
                    </div>
                </div>
                <div id="posts-list" class="posts-list">
                    <!-- 帖子将通过JavaScript动态生成 -->
                    <div class="loading">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>北京徒个乐</h3>
                <p>探索城市周边的自然美景，享受徒步的乐趣。</p>
            </div>
            <div class="footer-section">
                <h3>快速链接</h3>
                <a href="index.html">首页</a>
                <a href="routes.html">路线列表</a>
                <a href="filter.html">路线筛选</a>
                <a href="guide.html">徒步指南</a>
                <a href="community.html">徒步社区</a>
                <a href="about.html">关于我们</a>
            </div>
            <div class="footer-section">
                <h3>联系我们</h3>
                <p>邮箱: thisisnotreal.com</p>
                <p>电话: 14-28-57</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 北京徒个乐. 保留所有权利.</p>
        </div>
    </footer>

    <!-- 滚动到顶部按钮 -->
    <button id="scroll-to-top" style="position: fixed; bottom: 2rem; right: 2rem; background: var(--primary-color); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; display: none; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: all 0.3s ease;" onclick="scrollToTop()">↑</button>

    <!-- JavaScript -->
    <script src="js/main.js"></script>
    <script src="js/community.js"></script>
</body>
</html>
